<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Panel{% endblock %} — BOY</title>
  <link rel="stylesheet" href="/static/css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>BOY</h1>
      <span>Panel secretaria</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin" class="sidebar-link">
        <span class="icon">🏠</span><span>Inicio</span>
      </a>
      <a href="/admin/bandeja" class="sidebar-link">
        <span class="icon">📥</span><span>Bandeja de trabajo</span>
      </a>
      <a href="/admin/deportistas" class="sidebar-link">
        <span class="icon">👥</span><span>Deportistas</span>
      </a>
      <a href="/admin/finanzas" class="sidebar-link">
        <span class="icon">💰</span><span>Finanzas</span>
      </a>
      <div class="sidebar-section">Sistema</div>
      <a href="/admin/configuracion" class="sidebar-link">
        <span class="icon">⚙️</span><span>Configuración</span>
      </a>
    </nav>
  </aside>

  <div class="main">
    <header class="header">
      <div class="search-global">
        <span class="search-icon">🔍</span>
        <input type="text" id="globalSearch" placeholder="Buscar por nombre, documento o WhatsApp..." autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="header-right">
        <div style="position:relative">
          <button class="bell-btn" id="bellBtn">🔔<span class="bell-badge" id="bellBadge">0</span></button>
          <div class="notif-dropdown" id="notifDropdown">
            <div class="notif-dropdown-header">Notificaciones</div>
            <div id="notifList"></div>
          </div>
        </div>
      </div>
    </header>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>

  <script src="/static/js/admin.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
